name: Otomatik Liste Guncelle

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Cek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Gerekli Paketleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Botu Calistir
        run: python update_list.py

      - name: Degisiklikleri Kaydet
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add tr.m3u
          git commit -m "BlogTV guncellendi" || echo "Degisiklik yok"
          git push
